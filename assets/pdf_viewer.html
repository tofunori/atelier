<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PDF — select and send to Claude</title>
<script src="/.fig_thumbs/pdfjs/pdf.min.js"></script>
<script src="annot_kit.js"></script>
<style>
  :root{--bg:#202024;--card:#27272a;--card2:#1f1f23;--txt:#e4e4e7;--muted:#a1a1aa;--accent:#5b9dff;--border:#3f3f46}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,sans-serif}
  header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);
         padding:10px 16px;display:flex;gap:12px;align-items:center;font-size:13px}
  #pages{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px}
  .pg{position:relative;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.5)}
  .pg canvas{display:block}
  .textLayer{position:absolute;inset:0;overflow:hidden;line-height:1;opacity:1;user-select:none}
  .textLayer span{position:absolute;color:transparent;white-space:pre;transform-origin:0 0;cursor:text}
  .textLayer span.hl{background:rgba(255,213,74,.55);border-radius:2px}
  #sendBtn{position:fixed;display:none;z-index:100;background:var(--border);color:var(--txt);border:1px solid var(--border);
           border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .muted{color:var(--muted)}
  /* selection pill + annotation card (same language as the gallery/HTML overlay) */
  #selPill{position:fixed;z-index:300;display:none;align-items:center;gap:8px;
      background:rgba(24,27,34,.97);border:1px solid #3a4150;border-radius:22px;padding:5px 6px 5px 12px;
      box-shadow:0 10px 36px rgba(0,0,0,.45);color:var(--txt);font-size:13px;user-select:none;-webkit-user-select:none}
  #selPill .n{color:var(--muted);font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #selPill button{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #selPill .cm2{height:26px;padding:0 10px;border-radius:14px;background:transparent;
      border:1px solid #3a4150;color:var(--txt);font-size:12px;flex:none}
  #selPill .cm2:hover{border-color:#5b6575}
  #selPill .x{width:28px;height:28px;border-radius:50%;background:transparent;
      border:1px solid #3a4150;color:var(--muted);font-size:13px;flex:none}
  #selPill .x:hover{border-color:#5b6575;color:#fff}
  #selPill .go{width:32px;height:32px;border-radius:50%;background:#5b9dff;color:#fff;font-size:16px;flex:none}
  #selPill .go:hover{background:#76adff}
  #selCard{position:fixed;z-index:301;display:none;flex-direction:column;gap:10px;width:340px;
      background:rgba(24,27,34,.97);border:1px solid #3a4150;border-radius:16px;padding:12px 14px;
      box-shadow:0 14px 48px rgba(0,0,0,.55);color:var(--txt);font-size:13px}
  #selCard textarea{background:rgba(255,255,255,.04);border:1px solid #3a4150;border-radius:10px;
      outline:none;color:var(--txt);font-size:13px;line-height:1.45;padding:8px 10px;resize:none;
      font-family:inherit;min-height:44px;width:100%;box-sizing:border-box}
  #selCard textarea:focus{border-color:#5b9dff;box-shadow:0 0 0 2px rgba(91,157,255,.22)}
  #selCard .b{display:flex;gap:8px;justify-content:flex-end}
  #selCard button{padding:6px 14px;font-size:12.5px;border-radius:8px;cursor:pointer;
      border:1px solid #3a4150;background:transparent;color:var(--txt)}
  #selCard .cc:hover{border-color:#5b6575}
  #selCard .sv{background:#e8eaed;border-color:#e8eaed;color:#111;font-weight:600}
  #selCard .sv:hover{background:#fff}
  #annotBtn{margin-left:12px;background:var(--border);color:var(--txt);border:1px solid var(--border);
      border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
  #annotBtn:hover{border-color:#5b6575}
  #annotBtn.on{background:#c96442;border-color:#c96442;color:#fff}
</style>
<script>
function __ct(){try{return JSON.parse(localStorage.getItem('claudeTargetV1')||'null')}catch(e){return null}}(function(){var T={'Default':{bg:'#202024',card:'#27272a',card2:'#1f1f23',txt:'#e4e4e7',muted:'#a1a1aa',accent:'#5b9dff',border:'#3f3f46'},'Codex One':{bg:'#202024',card:'#2f343f',card2:'#21252b',txt:'#abb2bf',muted:'#7f848e',accent:'#4d78cc',border:'#3e4451'},'Dracula':{bg:'#282a36',card:'#343746',card2:'#21222c',txt:'#f8f8f2',muted:'#9aa0b3',accent:'#bd93f9',border:'#44475a'},'Nord':{bg:'#2e3440',card:'#3b4252',card2:'#272c36',txt:'#e5e9f0',muted:'#9aa3b2',accent:'#88c0d0',border:'#434c5e'}};var t;try{t=T[localStorage.getItem('figTheme')];}catch(e){}t=t||T['Default'];var r=document.documentElement.style;for(var k in t)r.setProperty('--'+k,t[k]);})();</script>
</head>
<body>
<header>
  <b id="fname">PDF</b>
  <span class="muted">Highlight a passage — Claude can access it automatically ("my selection")</span>
  <button id="annotBtn" title="Annoter la page courante (dessiner + envoyer à Claude)">&#9998; Annoter</button>
  <span id="selinfo" style="margin-left:auto;color:#ffd54a"></span>
  <span class="muted" id="status"></span>
</header>
<div id="pages"></div>
<button id="sendBtn">➜ Claude</button>
<div id="selPill"><span class="n"></span><button class="cm2" title="Ajouter un commentaire puis envoyer">&#128172; Annoter</button><button class="x" title="Annuler la sélection (Esc)">&#10005;</button><button class="go" title="Envoyer la sélection à la session Claude">&#8593;</button></div>
<div id="selCard"><textarea rows="2" placeholder="Ajouter une annotation&hellip;"></textarea>
  <div class="b"><button class="cc">Annuler</button><button class="sv">Enregistrer</button></div></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "/.fig_thumbs/pdfjs/pdf.worker.min.js";

const rel = new URLSearchParams(location.search).get("file");
document.getElementById("fname").textContent = rel ? rel.split("/").pop() : "(no file)";
let selPage = 1;

async function main(){
  let pdf;
  try {
    pdf = await pdfjsLib.getDocument({url: "/" + rel,
      standardFontDataUrl: "/.fig_thumbs/pdfjs/standard_fonts/",
      cMapUrl: "/.fig_thumbs/pdfjs/cmaps/", cMapPacked: true}).promise;
  } catch(e) {
    const p = document.getElementById("pages");
    p.textContent = "Unable to load PDF: " + (rel || "") + " — " + ((e && e.message) || e);  // textContent = XSS-safe
    p.style.cssText = "color:#ff6b6b;padding:40px;text-align:center;font-family:-apple-system,sans-serif";
    return;
  }
  const wrap = document.getElementById("pages");
  const scale = Math.min(1.6, (window.innerWidth - 60) / 612);
  for(let n = 1; n <= pdf.numPages; n++){
    const page = await pdf.getPage(n);
    const vp = page.getViewport({scale});
    const div = document.createElement("div");
    div.className = "pg"; div.dataset.page = n;
    div.style.width = vp.width + "px"; div.style.height = vp.height + "px";
    const cv = document.createElement("canvas");
    cv.width = vp.width * devicePixelRatio; cv.height = vp.height * devicePixelRatio;
    cv.style.width = vp.width + "px"; cv.style.height = vp.height + "px";
    div.appendChild(cv);
    const tl = document.createElement("div");
    tl.className = "textLayer";
    div.appendChild(tl);
    wrap.appendChild(div);
    const ctx = cv.getContext("2d");
    ctx.scale(devicePixelRatio, devicePixelRatio);
    await page.render({canvasContext: ctx, viewport: vp, intent: "print"}).promise;
    const tc = await page.getTextContent();
    buildTextLayer(tc, tl, vp);
    tl._order = readingOrder(tl, vp.width);
  }
}

// Couche texte maison : un span par item, largeur EXACTE tiree du PDF
// (item.width), glyphes etires par scaleX — plus de boites trop larges.
const _measureCv = document.createElement("canvas");
const _measureCtx = _measureCv.getContext("2d");
function buildTextLayer(tc, tl, vp){
  for(const item of tc.items){
    if(!item.str || !item.str.trim()) continue;
    const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
    const fontSize = Math.hypot(tx[2], tx[3]);
    const w = item.width * vp.scale;
    if(fontSize <= 0 || w <= 0) continue;
    const s = document.createElement("span");
    s.textContent = item.str;
    s.style.left = tx[4] + "px";
    s.style.top = (tx[5] - fontSize) + "px";
    s.style.fontSize = fontSize + "px";
    s.style.fontFamily = "sans-serif";
    s.dataset.l = tx[4]; s.dataset.t = tx[5] - fontSize; s.dataset.r = tx[4] + w;
    _measureCtx.font = fontSize + "px sans-serif";
    const nat = _measureCtx.measureText(item.str).width;
    if(nat > 0) s.style.transform = "scaleX(" + (w / nat) + ")";
    tl.appendChild(s);
  }
}

// Column reading order: find the vertical gutter (an x band crossed by almost
// no span) and sort column by column, then (y, x).
function readingOrder(tl, pageW){
  const spans = [...tl.querySelectorAll("span")].filter(s => s.textContent.trim());
  const boxes = spans.map(s => ({s,
    l: parseFloat(s.dataset.l), t: parseFloat(s.dataset.t), r: parseFloat(s.dataset.r)}));
  // detection de gouttiere sur les spans etroits seulement
  // (les lignes pleine largeur — titres, pieds de page — sont ignorees)
  const narrow = boxes.filter(b => (b.r - b.l) <= pageW*0.55);
  let bestX = null, bestCross = Infinity;
  for(let x = pageW*0.35; x <= pageW*0.65; x += pageW*0.01){
    const cross = narrow.reduce((n,b)=> n + (b.l < x-6 && b.r > x+6 ? 1 : 0), 0);
    if(cross < bestCross){ bestCross = cross; bestX = x; }
  }
  const twoCols = narrow.length > 10 && bestCross <= Math.max(2, narrow.length*0.05);
  const key = b => {
    const wide = (b.r - b.l) > pageW*0.55;
    const col = (twoCols && !wide && (b.l + b.r)/2 >= bestX) ? 1 : 0;
    return [col, Math.round(b.t/4), b.l];
  };
  boxes.sort((a,b)=>{
    const ka = key(a), kb = key(b);
    return ka[0]-kb[0] || ka[1]-kb[1] || ka[2]-kb[2];
  });
  return boxes.map(b => b.s);
}

const btn = document.getElementById("sendBtn");
let anchorIdx = null, dragLayer = null, layerSpans = [];
function clearHl(){
  document.querySelectorAll(".textLayer span.hl").forEach(s=>s.classList.remove("hl"));
  document.getElementById("selinfo").textContent = "";
}
let _selPushT = null;
function pushSelInfo(lines, words, text){
  clearTimeout(_selPushT);
  _selPushT = setTimeout(()=>{
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({lines, words, text: text||"", rel, name: rel?rel.split("/").pop():"", page: selPage})
    }).catch(()=>{});
  }, 150);
}
function updateSelInfo(){
  const hl = [...document.querySelectorAll(".textLayer span.hl")];
  if(!hl.length) return;
  const rows = new Set(hl.map(s => s.closest(".pg").dataset.page + ":" + Math.round(parseFloat(s.dataset.t)/4)));
  const words = hl.map(s => s.textContent).join(" ").trim().split(/\s+/).length;
  pushSelInfo(rows.size, words, hl.map(s=>s.textContent).join(" ").replace(/\s+/g," ").trim());
}
function spanAt(tl, x, y){
  // span under the pointer, else the nearest one on the same line
  const el = document.elementFromPoint(x, y);
  if(el && el.tagName === "SPAN" && el.closest(".textLayer") === tl && el.textContent.trim()) return el;
  let best = null, bd = 1e9;
  for(const s of layerSpans){
    const b = s.getBoundingClientRect();
    if(y < b.top - 4 || y > b.bottom + 4) continue;
    const dx = x < b.left ? b.left - x : (x > b.right ? x - b.right : 0);
    if(dx < bd){ bd = dx; best = s; }
  }
  return best;
}
document.addEventListener("pointerdown", e => {
  if(e.target.closest("#selPill") || e.target.closest("#selCard")) return;  // pill/card: keep selection
  const tl = e.target.closest(".textLayer");
  btn.style.display = "none";
  selHide();
  clearHl();
  if(!tl) return;
  dragLayer = tl;
  layerSpans = tl._order || [...tl.querySelectorAll("span")].filter(s => s.textContent.trim());
  const s = spanAt(tl, e.clientX, e.clientY);
  anchorIdx = s ? layerSpans.indexOf(s) : null;
  e.preventDefault();
});
document.addEventListener("pointermove", e => {
  if(anchorIdx === null || !dragLayer) return;
  const s = spanAt(dragLayer, e.clientX, e.clientY);
  if(!s) return;
  const i = layerSpans.indexOf(s);
  const a = Math.min(anchorIdx, i), b = Math.max(anchorIdx, i);
  layerSpans.forEach((sp, k) => sp.classList.toggle("hl", k >= a && k <= b));
  updateSelInfo();
});
document.addEventListener("pointerup", e => {
  if(anchorIdx === null || !dragLayer) return;
  anchorIdx = null;
  layerSpansLast = layerSpans;
  const hls = layerSpans.filter(s => s.classList.contains("hl"));
  if(!hls.length){ dragLayer = null; return; }
  const pg = dragLayer.closest(".pg");
  if(pg) selPage = pg.dataset.page;
  dragLayer = null;
  layerSpansLast = layerSpans;
  selPillShow(hls);
});
function hlText(){
  const spans = layerSpansLast.filter(s => s.classList.contains("hl"));
  return spans.map(s => s.textContent).join(" ").replace(/\s+/g, " ").trim();
}
let layerSpansLast = [];
btn.onclick = async () => {
  const text = hlText();
  btn.textContent = "⏳";
  try{
    const r = await fetch("/quote", {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({rel, page: selPage, text})});
    const j = await r.json();
    document.getElementById("status").textContent =
      j.sentToClaude ? "Pasted into Claude ✓" : "Copied to clipboard ✓";
  }catch(e){
    document.getElementById("status").textContent = "Server error";
  }
  btn.textContent = "➜ Claude"; btn.style.display = "none";
  setTimeout(()=>document.getElementById("status").textContent="", 3000);
};

// --- selection pill: annotate + send directly to the Claude session (same flow
//     as the LaTeX studio pill and the HTML report overlay; /quote with direct:true) ---
const selPill = document.getElementById("selPill"), selCard = document.getElementById("selCard");
function selPillShow(hls){
  const text = hlText();
  if(!text){ selHide(); return; }
  selPill.querySelector(".n").textContent = text.length > 48 ? text.slice(0,45).replace(/\s+\S*$/,"") + "…" : text;
  // union rect of the highlighted spans (viewport coords)
  let l = Infinity, r = -Infinity, top = Infinity, bot = -Infinity;
  hls.forEach(s => { const b = s.getBoundingClientRect();
    l = Math.min(l, b.left); r = Math.max(r, b.right); top = Math.min(top, b.top); bot = Math.max(bot, b.bottom); });
  selPill.style.display = "flex";
  const w = selPill.offsetWidth, h = selPill.offsetHeight;
  let x = Math.min(Math.max(8, (l + r)/2 - w/2), innerWidth - w - 8);
  let y = bot + 10;
  if(y + h > innerHeight - 8) y = top - h - 10;
  selPill.style.left = x + "px"; selPill.style.top = Math.max(8, y) + "px";
}
function selHide(){ selPill.style.display = "none"; selCard.style.display = "none"; }
function selCancel(){ selHide(); clearHl();
  fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({lines:0, words:0})}).catch(()=>{});
}
function selSend(comment){
  const text = hlText();
  if(!text) return;
  const go = selPill.querySelector(".go");
  go.textContent = "⏳";
  fetch("/quote", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({rel, page: selPage, text, comment: comment || "", direct: true, target: __ct()})})
    .then(r => r.json())
    .then(() => { go.textContent = "✓"; setTimeout(() => { go.textContent = "↑"; selHide(); }, 1200); })
    .catch(() => { go.textContent = "!"; setTimeout(() => { go.textContent = "↑"; }, 1600); });
}
selPill.addEventListener("mousedown", e => e.preventDefault());
selPill.querySelector(".go").onclick = () => selSend("");
selPill.querySelector(".x").onclick = e => { e.stopPropagation(); selCancel(); };
selPill.querySelector(".cm2").onclick = () => {
  selCard.style.display = "flex";
  selCard.style.left = Math.min(parseFloat(selPill.style.left) || 8, innerWidth - 356) + "px";
  selCard.style.top = selPill.style.top;
  selCard.querySelector("textarea").focus();
};
selCard.querySelector(".cc").onclick = () => { selCard.style.display = "none"; selCard.querySelector("textarea").value = ""; };
selCard.querySelector(".sv").onclick = () => {
  const v = selCard.querySelector("textarea").value.trim();
  selCard.style.display = "none"; selCard.querySelector("textarea").value = "";
  selSend(v);
};
selCard.querySelector("textarea").addEventListener("keydown", e => {
  e.stopPropagation();
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); selCard.querySelector(".sv").click(); }
  else if(e.key === "Escape"){ selCard.querySelector(".cc").click(); }
});
document.addEventListener("keydown", e => { if(e.key === "Escape") selCancel(); });

// --- drawn annotation (shared AnnotKit): one transparent overlay per page,
//     activated on the page most visible in the viewport ---
const annotBtn = document.getElementById("annotBtn");
const annotKits = new Map();   // page number (string) -> {overlay, api, cv}
let annotOn = false;
function visiblePage(){
  let best = null, bestVis = -1;
  const vh = window.innerHeight;
  for(const pg of document.querySelectorAll(".pg")){
    const r = pg.getBoundingClientRect();
    const vis = Math.max(0, Math.min(r.bottom, vh) - Math.max(r.top, 0));
    if(vis > bestVis){ bestVis = vis; best = pg; }
  }
  return best;
}
function kitFor(pg){
  const n = pg.dataset.page;
  if(annotKits.has(n)) return annotKits.get(n);
  const cv = pg.querySelector("canvas");
  const overlay = document.createElement("canvas");
  overlay.width = cv.width; overlay.height = cv.height;   // device-pixel space, matches the pdf.js canvas
  overlay.style.cssText = "position:absolute;left:0;top:0;touch-action:none;pointer-events:none;"
    + "width:" + cv.style.width + ";height:" + cv.style.height;
  pg.appendChild(overlay);
  const api = AnnotKit.create({
    overlay: overlay,
    exportBase: function(){ return {src: cv, w: cv.width, h: cv.height}; },
    name: function(){ return (rel ? rel.split("/").pop() : "pdf") + "-p" + n; }
  });
  const rec = {overlay: overlay, api: api, cv: cv};
  annotKits.set(n, rec);
  return rec;
}
function setAnnot(on){
  if(on){
    const pg = visiblePage();
    if(!pg) return;
    for(const rec of annotKits.values()) rec.api.disable();   // one active page at a time
    kitFor(pg).api.enable();
    annotOn = true; annotBtn.classList.add("on");
  } else {
    for(const rec of annotKits.values()) rec.api.disable();
    annotOn = false; annotBtn.classList.remove("on");
  }
}
annotBtn.onclick = () => setAnnot(!annotOn);

if(rel) main();
</script>
</body>
</html>
